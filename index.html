const shortAddr = a => a ? a.slice(0,10)+"…"+a.slice(-6) : "—";
const blocksToTime = b => {
  if(!b) return "PERMANENT";
  const m=b*10;
  if(m<60) return `~${m}m`;
  if(m<1440) return `~${Math.round(m/60)}h`;
  if(m<10080) return `~${Math.round(m/1440)}d`;
  if(m<43200) return `~${Math.round(m/10080)}wk`;
  return `~${Math.round(m/43800)}mo`;
};

const css = `
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;600;700;800&display=swap');

/* ── WALLET GATE ── */
function WalletGate({onConnect}) {
  const [phase,setPhase]=useState("idle");
  const [dot,setDot]=useState(0);
  useEffect(()=>{
    if(phase!=="awaiting") return;
    const t=setInterval(()=>setDot(d=>(d+1)%4),380);
    const done=setTimeout(()=>{clearInterval(t);setPhase("approved");},2600);
    return ()=>{clearInterval(t);clearTimeout(done);};
  },[phase]);
  useEffect(()=>{
    if(phase==="approved"){const t=setTimeout(onConnect,700);return ()=>clearTimeout(t);}
  },[phase]);
  const dots=".".repeat(dot);
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",zIndex:1,padding:32,minHeight:0}}>
      <div style={{position:"absolute",width:500,height:500,borderRadius:"50%",background:`radial-gradient(circle,${C.cyan}14,transparent 70%)`,filter:"blur(50px)",pointerEvents:"none",top:"50%",left:"50%",transform:"translate(-50%,-50%)"}}/>
      <div style={{position:"absolute",width:300,height:300,borderRadius:"50%",background:`radial-gradient(circle,${C.purple}10,transparent 70%)`,filter:"blur(40px)",pointerEvents:"none",top:"40%",left:"60%",transform:"translate(-50%,-50%)"}}/>

          <div style={{fontFamily:"'Exo 2',sans-serif",fontWeight:800,fontSize:22,color:C.text,letterSpacing:"0.08em",marginBottom:4}}>MOTOSWAP LOCKER</div>
          <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:C.muted,letterSpacing:"0.2em"}}>LP LOCK PROTOCOL · OP_NET v3.0 TESTNET</div>
        </div>
        <div style={{display:"flex",marginBottom:28,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden",background:C.surf}}>
          {[["1.75M","LP SECURED"],[4,"LOCKS"],[2,"PERMANENT"],[3,"PAIRS"]].map(([v,l],i)=>(

              <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:7,color:C.muted,letterSpacing:"0.1em",marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:28}}>
          {phase==="idle" && (<>
            <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:C.muted,letterSpacing:"0.18em",marginBottom:18}}>CONNECT WALLET TO CONTINUE</div>
            <button onClick={()=>setPhase("awaiting")} style={{width:"100%",padding:"15px 0",cursor:"pointer",background:`linear-gradient(135deg,${C.cyan}1a,${C.purple}1a)`,border:`1.5px solid ${C.cyan}`,borderRadius:8,fontFamily:"'Share Tech Mono',monospace",fontSize:12,color:C.cyan,letterSpacing:"0.18em",fontWeight:"bold",boxShadow:`0 0 24px ${C.cyan}28`,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>

            <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:5,textAlign:"left"}}>

              ))}
            </div>
          </>)}
          {phase==="awaiting" && (
            <div style={{textAlign:"center",padding:"8px 0"}}>
              <div style={{width:48,height:48,borderRadius:"50%",border:`2px solid ${C.cyan}`,borderTopColor:"transparent",animation:"spin 0.8s linear infinite",margin:"0 auto 16px"}}/>

        </div>
      </div>
    </div>
  );
}

/* ── LOCK CARD ── */
function LockCard({lock,selected,onClick}) {
  const left=lock.unlockBlock>0?lock.unlockBlock-BLOCK:0;
  const pct=lock.perm?100:lock.done?100:Math.min(100,((BLOCK-lock.lockedAt)/(lock.unlockBlock-lock.lockedAt))*100);
  const sc=lock.perm?C.cyan:lock.done?C.muted:left<=0?C.green:C.yellow;
  const sl=lock.perm?"PERMANENT":lock.done?"RELEASED":left<=0?"UNLOCKABLE":"LOCKED";
  return (
    <div onClick={onClick} style={{background:selected?C.surf2:C.surf,border:`1px solid ${selected?lock.color:C.border}`,borderRadius:8,padding:"13px 15px",cursor:"pointer",transition:"border-color 0.15s",position:"relative",overflow:"hidden",boxShadow:selected?`0 0 18px ${lock.color}1a`:"none"}}>
      {selected&&<div style={{position:"absolute",inset:0,background:`radial-gradient(ellipse at top left,${lock.color}0e,transparent 60%)`,pointerEvents:"none"}}/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:7}}>
        <div>
          <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:8,color:C.muted,letterSpacing:"0.1em",marginBottom:2}}>LOCK #{String(lock.id).padStart(4,"0")}</div>
          <div style={{fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:13,color:lock.color,letterSpacing:"0.06em"}}>{lock.token}</div>
        </div>
        <div style={{background:`${sc}18`,border:`1px solid ${sc}40`,borderRadius:4,padding:"2px 7px",fontFamily:"'Share Tech Mono',monospace",fontSize:7,color:sc,letterSpacing:"0.1em",fontWeight:"bold"}}>{sl}</div>
      </div>
      <div style={{fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:19,color:C.text,marginBottom:5}}>
        {lock.amt} <span style={{fontSize:9,color:C.muted,fontFamily:"'Share Tech Mono',monospace"}}>LP</span>
      </div>
      <div style={{height:2,background:C.faint,borderRadius:1,overflow:"hidden",marginBottom:7}}>
        <div style={{width:`${pct}%`,height:"100%",background:lock.perm?`linear-gradient(90deg,${C.cyan},${C.purple})`:lock.done?"#333":`linear-gradient(90deg,${lock.color}88,${lock.color})`,boxShadow:`0 0 6px ${lock.color}55`}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between"}}>
        <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:8,color:C.muted}}>{shortAddr(lock.owner)}</div>
        <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:8,color:lock.perm?C.cyan:C.muted}}>{lock.perm?"∞ FOREVER":lock.done?"✓ DONE":left>0?`${left.toLocaleString()} BLK`:"READY"}</div>
      </div>
      {lock.ext&&<div style={{position:"absolute",top:0,right:0,background:`${C.green}18`,borderLeft:`1px solid ${C.green}35`,borderBottom:`1px solid ${C.green}35`,borderRadius:"0 8px 0 4px",padding:"2px 6px",fontFamily:"'Share Tech Mono',monospace",fontSize:7,color:C.green}}>↑ EXT</div>}
    </div>
  );
}

/* ── DETAIL PANEL ── */

    {k:"LOCK ID",v:`#${String(lock.id).padStart(4,"0")}`},
    {k:"LP PAIR",v:lock.token,c:lock.color},
    {k:"AMOUNT",v:`${lock.amt} LP`},
    {k:"OWNER",v:shortAddr(lock.owner),mono:true},
    {k:"TYPE",v:lock.perm?"PERMANENT BURN":"TIMELOCK",c:lock.perm?C.cyan:C.yellow},
    {k:"LOCKED AT",v:`BLK #${lock.lockedAt.toLocaleString()}`},
    {k:"UNLOCK BLK",v:lock.perm?"NEVER (∞)":`#${lock.unlockBlock.toLocaleString()}`},
    {k:"BLOCKS LEFT",v:lock.perm?"∞":lock.done?"0 — RELEASED":left>0?left.toLocaleString():"0 — READY"},

    <div style={{flex:1,background:C.surf,border:`1px solid ${C.border}`,borderRadius:8,display:"flex",flexDirection:"column",overflow:"hidden"}}>

        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,padding:0}}>✕</button>

      <div style={{padding:"18px 16px 14px",borderBottom:`1px solid ${C.border2}`,background:`radial-gradient(ellipse at center top,${lock.color}15,transparent 60%)`}}>

        <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:8,color:C.muted,marginTop:3,letterSpacing:"0.12em"}}>MOTOSWAP LP PAIR · OP_NET TESTNET</div>
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        {rows.map(({k,v,c,mono,it})=>(
          <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"6px 16px",borderBottom:`1px solid ${C.border2}`,gap:10}}>
            <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:8,color:C.muted,letterSpacing:"0.1em",minWidth:84,flexShrink:0}}>{k}</div>
            <div style={{fontFamily:mono?"'Share Tech Mono',monospace":"'Exo 2',sans-serif",fontWeight:mono?400:600,fontSize:mono?8:11,color:c||C.text,textAlign:"right",wordBreak:"break-all",fontStyle:it?"italic":"normal"}}>{v}</div>
          </div>
        ))}
      </div>
      {!lock.perm&&!lock.done&&(
        <div style={{padding:12,borderTop:`1px solid ${C.border}`,display:"flex",gap:8}}>
          {left<=0
            ?<button style={{flex:1,padding:"10px 0",cursor:"pointer",background:`${C.green}18`,border:`1px solid ${C.green}`,borderRadius:6,fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:C.green,letterSpacing:"0.1em"}}>◈ UNLOCK NOW</button>

          }
          <button style={{padding:"10px 12px",cursor:"pointer",background:`${C.purple}18`,border:`1px solid ${C.purple}55`,borderRadius:6,fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:C.purple}}>↑ EXTEND</button>
        </div>
      )}
      {lock.perm&&<div style={{padding:"10px 16px",borderTop:`1px solid ${C.border}`,fontFamily:"'Share Tech Mono',monospace",fontSize:8,color:C.cyan,letterSpacing:"0.1em",textAlign:"center",background:`${C.cyan}08`}}>🔐 PERMANENTLY BURNED — LIQUIDITY IMMUTABLY LOCKED</div>}
    </div>

      <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,width:400,maxWidth:"95vw",overflow:"hidden"}}>
        <div style={{padding:"12px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",background:C.surf2}}>
          <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:C.cyan,letterSpacing:"0.2em"}}>NEW LOCK</div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,padding:0}}>✕</button>
        </div>
        <div style={{padding:18,display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:7,color:C.muted,letterSpacing:"0.16em",marginBottom:6}}>LOCK TYPE</div>
            <div style={{display:"flex",gap:7}}>
              {[["timed","⏱ TIMELOCK"],["permanent","🔥 PERMANENT"]].map(([m,l])=>(
                <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"8px 0",cursor:"pointer",background:mode===m?(m==="permanent"?`${C.red}18`:`${C.cyan}18`):"transparent",border:`1px solid ${mode===m?(m==="permanent"?C.red:C.cyan):C.border}`,borderRadius:6,fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:mode===m?(m==="permanent"?C.red:C.cyan):C.muted}}>{l}</button>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:7,color:C.muted,letterSpacing:"0.16em",marginBottom:6}}>LP PAIR</div>
            <div style={{display:"flex",gap:6}}>
              {PAIRS.map(p=>(
                <button key={p.id} onClick={()=>setPair(p)} style={{flex:1,padding:"7px 0",cursor:"pointer",background:pair.id===p.id?`${p.color}18`:"transparent",border:`1px solid ${pair.id===p.id?p.color:C.border}`,borderRadius:6,fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:pair.id===p.id?p.color:C.muted}}>{p.label}</button>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:7,color:C.muted,letterSpacing:"0.16em",marginBottom:5}}>AMOUNT (LP TOKENS)</div>
            <input type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="0.00" style={{width:"100%",background:C.surf2,border:`1px solid ${C.border}`,borderRadius:6,padding:"10px 12px",fontFamily:"'Share Tech Mono',monospace",fontSize:13,color:C.text}}/>
          </div>
          {mode==="timed"&&(
            <div>
              <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:7,color:C.muted,letterSpacing:"0.16em",marginBottom:5}}>DURATION — {blocksToTime(parseInt(dur)||0)}</div>
              <div style={{display:"flex",gap:5,marginBottom:7}}>
                {presets.map(p=>(
                  <button key={p.l} onClick={()=>setDur(p.b)} style={{flex:1,padding:"5px 0",cursor:"pointer",background:dur===p.b?`${C.purple}22`:"transparent",border:`1px solid ${dur===p.b?C.purple:C.border}`,borderRadius:4,fontFamily:"'Share Tech Mono',monospace",fontSize:8,color:dur===p.b?C.purple:C.muted}}>{p.l}</button>
                ))}
              </div>
              <input type="number" value={dur} onChange={e=>setDur(e.target.value)} style={{width:"100%",background:C.surf2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:C.muted}}/>
            </div>
          )}
          <div>
            <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:7,color:C.muted,letterSpacing:"0.16em",marginBottom:5}}>LABEL (MAX 64 CHARS)</div>
            <input type="text" maxLength={64} value={label} onChange={e=>setLabel(e.target.value)} placeholder="e.g. Team Vesting Lock" style={{width:"100%",background:C.surf2,border:`1px solid ${C.border}`,borderRadius:6,padding:"9px 12px",fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:C.text}}/>
          </div>
          {mode==="permanent"&&<div style={{background:`${C.red}10`,border:`1px solid ${C.red}40`,borderRadius:6,padding:"9px 12px",fontFamily:"'Share Tech Mono',monospace",fontSize:8,color:C.red,lineHeight:1.8}}>⚠ IRREVERSIBLE — No release path. Cannot be undone.</div>}
          <button onClick={submit} style={{padding:"12px 0",cursor:amt?"pointer":"default",background:amt?(mode==="permanent"?`linear-gradient(135deg,${C.red}28,${C.red}10)`:`linear-gradient(135deg,${C.cyan}22,${C.purple}22)`):"transparent",border:`1px solid ${amt?(mode==="permanent"?C.red:C.cyan):C.border}`,borderRadius:8,fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:amt?(mode==="permanent"?C.red:C.cyan):C.muted,letterSpacing:"0.16em",fontWeight:"bold"}}>
            {mode==="permanent"?"🔥 SIGN & LOCK PERMANENTLY":"◈ SIGN & LOCK TOKENS"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── WALLET BADGE ── */
function WalletBadge({onDisconnect}) {
  const [open,setOpen]=useState(false);
  return (
    <div style={{position:"relative"}}>
      <button onClick={()=>setOpen(p=>!p)} style={{display:"flex",alignItems:"center",gap:7,background:`${C.green}14`,border:`1px solid ${C.green}40`,borderRadius:6,padding:"6px 13px",cursor:"pointer",fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:C.green}}>
        <span style={{animation:"pulse 2s infinite",fontSize:7}}>●</span>{DEMO_ADDR}
      </button>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,background:C.surf,border:`1px solid ${C.border}`,borderRadius:8,padding:14,minWidth:210,zIndex:50,boxShadow:"0 8px 32px #000a"}}>
          <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:7,color:C.muted,letterSpacing:"0.16em",marginBottom:10}}>OP_WALLET</div>
          {[["ADDRESS",DEMO_ADDR],["NETWORK",DEMO_NETWORK],["BALANCE",DEMO_BALANCE]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:7,color:C.muted}}>{k}</div>
              <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:8,color:C.text}}>{v}</div>
            </div>
          ))}
          <button onClick={()=>{onDisconnect();setOpen(false);}} style={{width:"100%",marginTop:10,padding:"7px 0",cursor:"pointer",background:"transparent",border:`1px solid ${C.border}`,borderRadius:4,fontFamily:"'Share Tech Mono',monospace",fontSize:8,color:C.muted}}>DISCONNECT</button>
        </div>
      )}
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const [connected,setConnected]=useState(false);
  const [locks,setLocks]=useState(BASE_LOCKS);
  const [selected,setSelected]=useState(BASE_LOCKS[0]);
  const [filter,setFilter]=useState("all");
  const [showNew,setShowNew]=useState(false);
  const [blockNum,setBlockNum]=useState(BLOCK);
  useEffect(()=>{
    if(!connected) return;
    const t=setInterval(()=>setBlockNum(b=>b+1),8000);
    return ()=>clearInterval(t);
  },[connected]);
  const filtered=locks.filter(l=>filter==="all"?true:filter==="permanent"?l.perm:filter==="timed"?(!l.perm&&!l.done):l.done);
  const totalLP=locks.filter(l=>!l.done).reduce((a,l)=>a+l.raw,0);
  function handleAdd({pair,amt,mode,dur,label}) {
    const n={id:locks.length+1,token:pair.label,owner:DEMO_ADDR,amt:parseInt(amt).toLocaleString(),raw:parseInt(amt)||0,unlockBlock:mode==="permanent"?0:blockNum+parseInt(dur),perm:mode==="permanent",done:false,ext:false,label:label||`${pair.label} Lock`,lockedAt:blockNum,color:pair.color};
    setLocks(prev=>[n,...prev]);setSelected(n);setFilter("all");
  }
  return (
    <div style={{background:C.bg,height:"100vh",display:"flex",flexDirection:"column",position:"relative",fontFamily:"'Share Tech Mono',monospace",overflow:"hidden"}}>
      <style>{css}</style>
      <GridBg/><Scanlines/>
      {/* NAV */}
      <div style={{position:"relative",zIndex:10,padding:"0 20px",height:52,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:`${C.bg}f0`,backdropFilter:"blur(10px)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:28,height:28,borderRadius:7,background:`linear-gradient(135deg,${C.cyan}38,${C.purple}38)`,border:`1.5px solid ${C.cyan}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>⬡</div>
            <div>
              <div style={{fontFamily:"'Exo 2',sans-serif",fontWeight:800,fontSize:13,color:C.text,letterSpacing:"0.07em",lineHeight:1.1}}>MOTOSWAP LOCKER</div>
              <div style={{fontSize:7,color:C.muted,letterSpacing:"0.14em"}}>LP LOCK PROTOCOL · OP_NET</div>
            </div>
          </div>
          <div style={{width:1,height:24,background:C.border}}/>
          <div style={{fontSize:8,color:C.muted,letterSpacing:"0.1em"}}>v3.0 · TESTNET</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:8,color:C.muted,display:"flex",alignItems:"center",gap:5}}>
            <span style={{animation:"pulse 2s infinite",color:C.green,fontSize:7}}>●</span>BLK #{blockNum.toLocaleString()}
          </div>
          {connected?(
            <>
              <button onClick={()=>setShowNew(true)} style={{background:`linear-gradient(135deg,${C.cyan}1a,${C.purple}1a)`,border:`1px solid ${C.cyan}55`,borderRadius:6,padding:"6px 14px",cursor:"pointer",fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:C.cyan,letterSpacing:"0.12em"}}>+ NEW LOCK</button>
              <WalletBadge onDisconnect={()=>setConnected(false)}/>
            </>
          ):(
            <button onClick={()=>setConnected(false)} style={{background:`linear-gradient(135deg,${C.cyan}1a,${C.purple}1a)`,border:`1px solid ${C.cyan}`,borderRadius:6,padding:"6px 16px",cursor:"pointer",fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:C.cyan,letterSpacing:"0.14em"}}>◈ CONNECT OP_WALLET</button>
          )}
        </div>
      </div>
      <Ticker/>
      {/* BODY */}
      {!connected?(
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",zIndex:1}}>
          <WalletGate onConnect={()=>setConnected(true)}/>
        </div>
      ):(
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",zIndex:1,animation:"fadeUp 0.35s ease"}}>
          <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:`${C.surf}88`,flexShrink:0}}>
            {[{l:"TOTAL LOCKED",v:totalLP.toLocaleString()+" LP",c:C.cyan},{l:"ACTIVE LOCKS",v:locks.filter(l=>!l.done).length,c:C.text},{l:"PERMANENT",v:locks.filter(l=>l.perm).length,c:C.cyan},{l:"LP PAIRS",v:new Set(locks.map(l=>l.token)).size,c:C.text}].map(({l,v,c},i)=>(
              <div key={i} style={{flex:1,padding:"10px 20px",borderRight:i<3?`1px solid ${C.border}`:"none"}}>
                <div style={{fontSize:7,color:C.muted,letterSpacing:"0.14em",marginBottom:4}}>{l}</div>
                <div style={{fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:19,color:c}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{flex:1,display:"flex",overflow:"hidden",minHeight:0}}>
            <div style={{width:295,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>
              <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:C.surf2,flexShrink:0}}>
                {["all","permanent","timed","released"].map(f=>(
                  <button key={f} onClick={()=>setFilter(f)} style={{flex:1,padding:"8px 0",background:"none",border:"none",borderBottom:`2px solid ${filter===f?C.cyan:"transparent"}`,cursor:"pointer",fontFamily:"'Share Tech Mono',monospace",fontSize:7,color:filter===f?C.cyan:C.muted}}>{f.toUpperCase()}</button>
                ))}
              </div>
              <div style={{flex:1,overflowY:"auto",padding:8,display:"flex",flexDirection:"column",gap:5}}>
                {filtered.map((lock,i)=>(
                  <div key={lock.id} style={{animation:`slideIn 0.18s ease ${i*0.04}s both`}}>
                    <LockCard lock={lock} selected={selected&&selected.id===lock.id} onClick={()=>setSelected(lock)}/>
                  </div>
                ))}
                {filtered.length===0&&<div style={{textAlign:"center",color:C.muted,fontSize:9,padding:36}}>NO LOCKS IN THIS CATEGORY</div>}
              </div>
            </div>
            <div style={{flex:1,padding:12,display:"flex",overflow:"hidden",minWidth:0}}>
              <DetailPanel lock={selected} onClose={()=>setSelected(null)}/>
            </div>
          </div>
        </div>
      )}
      {/* FOOTER */}
      <div style={{position:"relative",zIndex:9,padding:"7px 20px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:`${C.surf}dd`,fontSize:7,color:C.muted,letterSpacing:"0.08em",flexShrink:0}}>
        <div>P2OP DEPLOYED · REENTRANCY GUARD · CEI ORDERING · OPSCAN INDEXED</div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span>btc-vision/opwallet</span><span style={{color:C.border}}>|</span>
          <span>DeployableOP_20</span><span style={{color:C.border}}>|</span>
          <span style={{color:C.cyan,animation:"pulse 3s ease-in-out infinite"}}>⬡ OP_NET</span>
        </div>
      </div>
      {showNew&&connected&&<NewLockModal onClose={()=>setShowNew(false)} onAdd={handleAdd}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
  </script>
</body>
</html>
